database:
  url: sqlite:///zigbee.db
  path: zigbee.db

mqtt:
  base_topic: zigbee_manager
  broker_host: 192.168.1.1
  broker_port: 1883
  username: mqtt
  password: mqtt_password
  qos: 1

logging:
  level: INFO
  file: zigbee.log

web:
  host: 0.0.0.0
  port: 8000
  debug: false
  secret_key: ssshItsASecret
  ssl:
    enabled: false
    cert_file: certs/cert.pem
    key_file: certs/key.pem

# Matter integration (optional — requires python-matter-server)
matter:
  enabled: true                    # Start embedded server
  port: 5580                       # WS port (default 5580)
  storage_path: ./data/matter      # Fabric/node persistence
  vendor_id: 0xFFF1                # Matter vendor ID (default)
  fabric_id: 1                     # Fabric ID (default)
  bluetooth_adapter: 0             # BLE adapter index (optional, for commissioning)

  # --- OR use an external server instead ---
  # enabled: false
  # server_url: ws://localhost:5580/ws

# # MultiPAN RCP (auto-detected — only add to override defaults)
# multipan:
#   cpcd:
#     # serial_port: /dev/ttyACM0  # auto-detected from zigbee.port
#     baudrate: 460800
#     flow_control: hardware
#     # config_file: /usr/local/etc/cpcd.conf  # use system config if exists
#   zigbeed:
#     ezsp_port: 9999
#     # pty_path: /tmp/zigbeed_socket
#     # config_file: /usr/local/etc/zigbeed.conf
#   otbr:
#     enabled: true
#     thread_interface: wpan0
#     backbone_interface: eth0

database:
  path: zigbee.db
  url: sqlite:///zigbee.db
logging:
  file: zigbee.log
  level: INFO
mqtt:
  base_topic: zigbee_manager
  broker_host: 192.168.1.1
  broker_port: 1883
  password: mqtt_P45Sw02d!$
  qos: 1
  username: mqtt
web:
  debug: false
  host: 0.0.0.0
  port: 8000
  secret_key: 1H3ctICle$
  ssl:
    cert_file: certs/cert.pem
    enabled: true
    key_file: certs/key.pem
# Matter integration (optional — requires python-matter-server)
matter:
  enabled: true                    # Start embedded server
  port: 5580                       # WS port (default 5580)
  storage_path: ./data/matter      # Fabric/node persistence
  vendor_id: 0xFFF1                # Matter vendor ID (default)
  fabric_id: 1                     # Fabric ID (default)
  bluetooth_adapter: 0             # BLE adapter index (optional, for commissioning)

  # --- OR use an external server instead ---
  # enabled: false
  # server_url: ws://localhost:5580/ws

ai:
  provider: ollama
  model: llama3.1:8b-instruct-q4_K_M
  base_url: http://localhost:11434/v1
  temperature: 0.3
  max_tokens: 2000

zigbee:
  address_table_size: 16
  aps_unicast_message_count: 10
  channel: 25
  coordinator_type: ember
  extended_pan_id:
    - 12
    - 139
    - 142
    - 213
    - 53
    - 65
    - 246
    - 16

  ezsp:
    baudrate: auto           # Was: 460800 — now auto-detected via ASH handshake
    flow_control: auto       # Was: hardware — now auto-detected
    config:
      CONFIG_ADDRESS_TABLE_SIZE: 32
      CONFIG_APS_UNICAST_MESSAGE_COUNT: 32
      CONFIG_BINDING_TABLE_SIZE: 32
      CONFIG_BROADCAST_TABLE_SIZE: 15
      CONFIG_FRAGMENT_DELAY_MS: 50
      CONFIG_FRAGMENT_WINDOW_SIZE: 8
      CONFIG_INDIRECT_TRANSMISSION_TIMEOUT: 7680
      CONFIG_MAX_HOPS: 30
      CONFIG_MULTICAST_TABLE_SIZE: 16
      CONFIG_NEIGHBOR_TABLE_SIZE: 26
      CONFIG_PACKET_BUFFER_COUNT: 254
      CONFIG_RETRY_QUEUE_SIZE: 16
      CONFIG_ROUTE_TABLE_SIZE: 32
      CONFIG_SOURCE_ROUTE_TABLE_SIZE: 255

  znp:
    baudrate: auto           # Was: 115200 — now auto-detected
    config:
      CONFIG_ADDRESS_TABLE_SIZE: 32
      CONFIG_APS_UNICAST_MESSAGE_COUNT: 32
      CONFIG_BINDING_TABLE_SIZE: 32
      CONFIG_BROADCAST_TABLE_SIZE: 15
      CONFIG_FRAGMENT_DELAY_MS: 50
      CONFIG_FRAGMENT_WINDOW_SIZE: 8
      CONFIG_INDIRECT_TRANSMISSION_TIMEOUT: 7680
      CONFIG_MAX_HOPS: 30
      CONFIG_MULTICAST_TABLE_SIZE: 16
      CONFIG_NEIGHBOR_TABLE_SIZE: 26
      CONFIG_PACKET_BUFFER_COUNT: 254
      CONFIG_RETRY_QUEUE_SIZE: 16
      CONFIG_ROUTE_TABLE_SIZE: 32
      CONFIG_SOURCE_ROUTE_TABLE_SIZE: 255
      led_mode: false

  deconz:
    baudrate: auto           # 38400 for ConBee II/III/RaspBee, 57600 for ConBee I

  indirect_tx_timeout: 7680
  max_hops: 30
  multicast_table_size: 16
  neighbour_table_size: 26
  network_key:
    - 162
    - 53
    - 36
    - 49
    - 153
    - 90
    - 52
    - 78
    - 108
    - 181
    - 87
    - 154
    - 10
    - 28
    - 8
    - 91
  packet_buffer_count: 254
  pan_id: E47C
  port: /dev/ttyACM0
  radio_type: auto
  source_route_table_size: 32
  topology_scan_interval: 120

